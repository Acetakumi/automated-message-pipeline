name: Send Quote

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  send-sms:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop after 30 days
        shell: bash
        run: |
          START_DATE="2026-03-15"
          END_DATE=$(date -d "$START_DATE +30 days" +%s)
          TODAY=$(date +%s)

          if [ "$TODAY" -gt "$END_DATE" ]; then
            echo "30 days passed, stopping workflow."
            exit 0
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SMS script
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          TO_NUMBER: ${{ secrets.TO_NUMBER }}
          NINJA_API_KEY: ${{ secrets.NINJA_API_KEY }}
          MESSAGE: ${{ secrets.MESSAGE }}
        run: python src/send_sms.py

      - name: Push Changes to repository
        run: |
          # Note: the following account information will not work on GHES
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "update quote"
          git push
